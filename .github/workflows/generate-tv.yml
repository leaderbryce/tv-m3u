name: Generate TV M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *"

concurrency:
  group: generate-tv-m3u
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TV script
        run: npm run auto

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tv.m3u tv-merged.json .state.json
          git commit -m "Update generated TV files" || echo "No changes to commit"
          git push
